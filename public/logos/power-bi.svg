<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Power BI logo</title>
  <desc id="desc">Power BI yellow bar chart mark</desc>
  <defs>
    <linearGradient id="barA" x1="16" x2="16" y1="74" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6A700"/>
      <stop offset="1" stop-color="#F9D54A"/>
    </linearGradient>
    <linearGradient id="barB" x1="38" x2="38" y1="74" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D99A00"/>
      <stop offset="1" stop-color="#F7C600"/>
    </linearGradient>
    <linearGradient id="barC" x1="60" x2="60" y1="74" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C88700"/>
      <stop offset="1" stop-color="#F2B400"/>
    </linearGradient>
    <linearGradient id="barD" x1="80" x2="80" y1="74" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B97800"/>
      <stop offset="1" stop-color="#DFA300"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="#fff7d6"/>
  <rect x="12" y="44" width="16" height="32" rx="8" fill="url(#barA)"/>
  <rect x="32" y="28" width="16" height="48" rx="8" fill="url(#barB)"/>
  <rect x="52" y="14" width="16" height="62" rx="8" fill="url(#barC)"/>
  <rect x="72" y="36" width="12" height="40" rx="6" fill="url(#barD)"/>
